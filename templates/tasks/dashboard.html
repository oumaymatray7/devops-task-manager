{% extends 'tasks/base.html' %}

{% block content %}

<h1 class="mb-4">Dashboard</h1>

<div class="row">

    <div class="col-md-3">
        <div class="card bg-primary text-white p-3">
            <h4>Total Tasks</h4>
            <h2>{{ total_tasks }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-success text-white p-3">
            <h4>Completed</h4>
            <h2>{{ completed_tasks }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-warning text-dark p-3">
            <h4>Pending</h4>
            <h2>{{ pending_tasks }}</h2>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-info text-white p-3">
            <h4>In Progress</h4>
            <h2>{{ in_progress_tasks }}</h2>
        </div>
    </div>

</div>

<a href="{% url 'task_list' %}" class="btn btn-dark mt-4">
    Manage Tasks
</a>

{% endblock %}
