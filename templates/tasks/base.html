<!DOCTYPE html>
<html>
<head>
    <title>DevOps Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f7fc;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#111827;
            color:white;
            padding-top:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#2563eb;
        }

        .main-content{
            margin-left:250px;
            padding:30px;
        }

        .card-dashboard{
            border:none;
            border-radius:15px;
            color:white;
            padding:25px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .bg-blue{
            background:#2563eb;
        }

        .bg-green{
            background:#16a34a;
        }

        .bg-orange{
            background:#ea580c;
        }

        .bg-purple{
            background:#7c3aed;
        }

        table{
            background:white;
            border-radius:10px;
            overflow:hidden;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3 class="text-center mb-4">
        <i class="bi bi-kanban"></i>
        TaskManager
    </h3>

    <a href="{% url 'dashboard' %}">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="{% url 'task_list' %}">
        <i class="bi bi-list-check"></i>
        Tasks
    </a>

    {% if user.is_authenticated %}
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}

        <button type="submit"
        class="btn btn-danger w-75 ms-4 mt-4">
            Logout
        </button>

    </form>
    {% endif %}

</div>

<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
