{% extends 'tasks/base.html' %}

{% block content %}
<h2>Supprimer tâche</h2>

<p>Voulez-vous vraiment supprimer : <strong>{{ task.title }}</strong> ?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Oui, supprimer</button>
    <a href="{% url 'task_list' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
